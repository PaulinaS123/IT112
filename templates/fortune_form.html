<!DOCTYPE html>
<html>
  <head>
    <title>Fortune Teller</title>
  </head>
  <body>
    <h2>Welcome to the Fortune Teller</h2>
    <form action="/fortune" method="POST">
      <label for="name">Your name:</label><br />
      <input type="text" id="name" name="name" required /><br /><br />

      <label for="color">Pick a color:</label><br />
      <select name="color" id="color">
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="yellow">Yellow</option></select
      ><br /><br />

      <label for="number">Pick a number:</label><br />
      <select name="number" id="number">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option></select
      ><br /><br />

      <button type="submit">Tell my fortune!</button>
    </form>
  </body>
</html>
